networks:
  novellier-network:
    driver: bridge

services:
  # Express server that connects to ChromaDB and Ollama
  server:
    build: ./server
    ports:
      - "5001:5000"
    networks:
      - novellier-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Required for container monitoring
    environment:
      - CHROMA_URL=${CHROMA_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - MONGO_URL=${MONGO_URL}
      - MONGO_DB=${MONGO_DB}
      - AI_PROVIDER=${AI_PROVIDER}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET} # Default secret, should be changed later
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}
      - COMPOSE_NETWORK=${COMPOSE_NETWORK}
    depends_on:
      chromadb:
        condition: service_healthy
      ollama: 
        condition: service_healthy  
      mongodb:
        condition: service_healthy 
    healthcheck: 
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

# Frontend React app
  client:
    build: 
      context: ./client
      target: production
    ports:
      - "3001:80"
    networks:
      - novellier-network
    profiles: ["prod"]
    volumes:
      - ./client:/app
      - /app/node_modules
    environment: 
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=0
    stdin_open: true
    tty: true
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

# Frontend Development React App (with hot reloading 🌶️)
  client-dev:
    build: 
      context: ./client
      target: development
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    networks:
      - novellier-network
    profiles: ["dev"]
    volumes:
      - ./client:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # ChromaDB vector database for storing/querying embeddings
  chromadb:
    image: chromadb/chroma:0.4.24
    ports:
      - "8001:8000"
    networks:
      - novellier-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat').read()\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Ollama LLM server for hosting language models
  ollama:
    image: ollama/ollama:latest
    # build: ./ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
      - ./ollama/pull-model.sh:/pull-model.sh
    networks:
      - novellier-network
    entrypoint: ["bash", "/pull-model.sh"]  # Pull the model on startup, can be modified to pull specific models or handle updates
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  # Mongo DB for storing user data, tokens, and stories
  mongodb:
    image: mongo:7
    ports: 
      - "27018:27017"
    networks:
      - novellier-network
    volumes:
      - novellier-mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin # Default admin credentials, should be changed in production
    healthcheck:
      test: ["CMD", "mongosh", "-u", "admin", "-p", "admin", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Portainer container for grabbing the status of the containers. To be used in the Admin Panel.
  # TODO: I have to find a use case for this since I can actually just use the Docker Daemon API directly. Or maybe just remove.
  portainer:
    image: portainer/portainer-ce:latest
    environment:
      - INITIAL_ADMIN_USER=${PORTAINER_USERNAME:-admin}
      - INITIAL_ADMIN_PASSWORD=${PORTAINER_PASSWORD:-portainer}
    networks:
      - novellier-network
    ports:
      - "9000:9000"

# Mongo Express for managing the MongoDB instance through a web interface. Not needed but it'll be useful later.
  mongo-express:
    image: mongo-express:1.0.2-20
    ports:
      - "8081:8081"
    networks:
      - novellier-network
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=admin
      - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  portainer_data:
  novellier-mongo-data:
  novellier-ollama-data: