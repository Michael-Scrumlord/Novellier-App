networks:
    novellier-network:
        driver: bridge
    # Isolated network for socket proxy — only the server can reach it.
    docker-proxy-network:
        driver: bridge
        internal: true

services:
    # Express server that connects to ChromaDB and Ollama
    server:
        build: ./server
        ports:
            - '5001:5000'
        networks:
            - novellier-network
            - docker-proxy-network
        environment:
            - CHROMA_URL=${CHROMA_URL}
            - OLLAMA_URL=${OLLAMA_URL}
            - MONGO_URL=${MONGO_URL}
            - MONGO_DB=${MONGO_DB}
            - LLM_MODEL=${LLM_MODEL}
            - SUMMARY_MODEL=${SUMMARY_MODEL}
            - LOCAL_MODELS=${LOCAL_MODELS}
            - CONSTRAINED_MODELS=${CONSTRAINED_MODELS}
            - BALANCED_MODEL=${BALANCED_MODEL}
            - EMBEDDING_MODEL=${EMBEDDING_MODEL}
            - AI_PROVIDER=${AI_PROVIDER}
            - OPENAI_API_KEY=${OPENAI_API_KEY:-}
            - GEMINI_API_KEY=${GEMINI_API_KEY:-}
            - JWT_SECRET=${JWT_SECRET}
            - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}
            - COMPOSE_NETWORK=${COMPOSE_NETWORK}
            - DOCKER_HOST=tcp://docker-socket-proxy:2375
        depends_on:
            docker-socket-proxy:
                condition: service_healthy
            chromadb:
                condition: service_healthy
            mongodb:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        deploy:
            resources:
                limits:
                    cpus: '1.5'
                    memory: 1g
        restart: unless-stopped

    # Read-only Docker API proxy — exposes only the endpoints the server needs.
    # The raw socket is never visible to application containers.
    docker-socket-proxy:
        image: tecnativa/docker-socket-proxy:latest
        networks:
            - docker-proxy-network
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        environment:
            # Allow list — deny everything, permit only what the monitoring adapter uses.
            - CONTAINERS=1   # GET /containers/json
            - VOLUMES=1      # GET /volumes, GET /system/df (includes volumes)
            - INFO=1         # GET /info
            - SYSTEM=1       # GET /system/df (volume disk usage — routed under SYSTEM, not VOLUMES)
            # Explicitly deny all mutating / privileged endpoints.
            # Keep this in mind.. maybe I can use these endpoints later. 
            - POST=0
            - DELETE=0
            - BUILD=0
            - COMMIT=0
            - CONFIGS=0
            - DISTRIBUTION=0
            - EXEC=0
            - GRPC=0
            - IMAGES=0
            - NETWORKS=0
            - NODES=0
            - PLUGINS=0
            - SECRETS=0
            - SERVICES=0
            - SESSION=0
            - SWARM=0
            - TASKS=0
        healthcheck:
            test: ['CMD-SHELL', 'nc -z localhost 2375 || exit 1']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        deploy:
            resources:
                limits:
                    cpus: '0.1'
                    memory: 32m
        restart: unless-stopped

    # Frontend React app
    client:
        build:
            context: ./client
            target: production
        ports:
            - '3001:80'
        networks:
            - novellier-network
        profiles: ['prod']
        volumes:
            - ./client:/app
            - /app/node_modules
        environment:
            - CHOKIDAR_USEPOLLING=true
            - WATCHPACK_POLLING=true
            - WDS_SOCKET_PORT=0
        stdin_open: true
        tty: true
        depends_on:
            server:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256m
        restart: unless-stopped

    # Frontend Development React App (with hot reloading 🌶️)
    client-dev:
        build:
            context: ./client
            target: development
        command: npm run dev -- --host 0.0.0.0 --port 5173
        ports:
            - '5173:5173'
        networks:
            - novellier-network
        profiles: ['dev']
        volumes:
            - ./client:/app
            - /app/node_modules
        stdin_open: true
        tty: true
        depends_on:
            server:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 1g
        restart: unless-stopped

    # ChromaDB vector database for storing/querying embeddings
    chromadb:
        image: chromadb/chroma:0.4.24
        ports:
            - '8001:8000'
        networks:
            - novellier-network
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/api/v1/heartbeat'').read()" || exit 1',
                ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 1g
        restart: unless-stopped

    # Ollama LLM server for hosting language models
    ollama:
        image: ollama/ollama:0.20.3
        entrypoint:
            - /bin/sh
            - -lc
            - |
                ollama serve &
                echo "Waiting for Ollama server to start..."
                until ollama list > /dev/null 2>&1; do sleep 1; done
                echo "Pulling nomic-embed-text model..."
                ollama pull nomic-embed-text
                wait
        ports:
            - '11435:11434'
        volumes:
            - novellier-ollama-data:/root/.ollama
        networks:
            - novellier-network
        healthcheck:
            test: ['CMD-SHELL', 'ollama list > /dev/null 2>&1 || exit 1']
            interval: 10s
            timeout: 10s
            retries: 30
            start_period: 120s
        deploy:
            resources:
                limits:
                    cpus: '4.0'
                    memory: 8g
        restart: unless-stopped

    # Mongo DB for storing user data, tokens, and stories/story summaries
    mongodb:
        image: mongo:7
        ports:
            - '27018:27017'
        networks:
            - novellier-network
        volumes:
            - novellier-mongo-data:/data/db
        environment:
            - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
            - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'mongosh -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand(''ping'')"',
                ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 1g
        restart: unless-stopped

    # YouTrack Demo Integration
    # Start with:  docker compose --profile youtrack up
    # Tear down:   docker compose --profile youtrack down -v
    # Remove completely: delete this block and the youtrack-advisor/ directory.
    youtrack:
        image: jetbrains/youtrack:2026.1.13162
        ports:
            - '5174:8080'
        networks:
            - novellier-network
        volumes:
            - youtrack-data:/opt/youtrack/data
            - youtrack-logs:/opt/youtrack/logs
            - youtrack-conf:/opt/youtrack/conf
            - youtrack-backups:/opt/youtrack/backups
        profiles: [youtrack]
        healthcheck:
            test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/api/productUrlMapping || exit 1']
            interval: 30s
            timeout: 10s
            retries: 10
            start_period: 120s
        deploy:
            resources:
                limits:
                    cpus: '2.0'
                    memory: 2g
        restart: unless-stopped

    # YouTrack Advisor — React UI + Express proxy that bridges YouTrack and Novellier.
    # Accessible at http://localhost:8090 (or http://<host-ip>:8090 on your local network).
    # This needs to be removed before deploying to Docker Hub!!! It's just for the demo
    youtrack-advisor:
        build: ./youtrack-advisor
        ports:
            - '8090:3000'
        networks:
            - novellier-network
        profiles: [youtrack]
        environment:
            - NOVELLIER_URL=http://server:5000
            - NOVELLIER_ADMIN_USER=${NOVELLIER_ADMIN_USER:-app_youtrack_admin}
            - NOVELLIER_ADMIN_PASS=${NOVELLIER_ADMIN_PASS}
            - YOUTRACK_URL=http://youtrack:8080
            - YOUTRACK_TOKEN=${YOUTRACK_TOKEN}
        depends_on:
            server:
                condition: service_healthy
        healthcheck:
            test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 20s
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256m
        restart: unless-stopped

volumes:
    novellier-mongo-data:
    novellier-ollama-data:
    # YouTrack Demo volumes — removed with: docker compose --profile youtrack down -v
    youtrack-data:
    youtrack-logs:
    youtrack-conf:
    youtrack-backups: